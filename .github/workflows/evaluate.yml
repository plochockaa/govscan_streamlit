name: Run Evaluation

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max repos to evaluate"
        default: "200"
        required: false

permissions:
  contents: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --extra pipeline

      - name: Restore full DB from cache
        uses: actions/cache/restore@v5
        with:
          path: data/govscan.db
          key: govscan-db-${{ github.run_id }}
          restore-keys: |
            govscan-db-

      - name: Run evaluation
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: |
          uv run python -c "
          import os
          from mistralai.client import Mistral
          from pipeline.evaluate import evaluate_batch
          client = Mistral(api_key=os.environ['MISTRAL_API_KEY'])
          stats = evaluate_batch(client, limit=int('${{ github.event.inputs.limit }}'))
          print(f'Evaluated: {stats[\"repos_evaluated\"]}')
          print(f'Avg score: {stats[\"avg_score\"]:.2%}')
          print(f'Cost: \${stats[\"cost_usd\"]:.4f}')
          "

      - name: Commit lite DB to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sqlite3 data/govscan.db "UPDATE repos SET readme_text = NULL;"
          git pull --rebase --autostash origin main
          git add -f data/govscan.db
          git diff --staged --quiet && echo "No DB changes" || (
            git commit -m "chore: evaluation run [skip ci]" && git push
          )
