name: Nightly Pipeline

on:
  schedule:
    - cron: "0 23 * * *"  # 23:00 UTC = 01:00 CEST (UTC+2)
  workflow_dispatch:       # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          # use the built-in token so the later git push is authorised
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --frozen --extra pipeline

      # Restore the full DB (with readme_text) from the previous run's cache.
      # On first run, or after a cache miss, falls back to the lite DB in git.
      - name: Restore full DB from cache
        uses: actions/cache/restore@v5
        with:
          path: data/govscan.db
          key: govscan-db-${{ github.run_id }}
          restore-keys: |
            govscan-db-

      - name: Run fetch → classify → embed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python -m pipeline.run

      # Save the full DB before we strip readme_text for the git commit.
      - name: Save full DB to cache
        uses: actions/cache/save@v5
        with:
          path: data/govscan.db
          key: govscan-db-${{ github.run_id }}

      - name: Commit lite DB to git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          sqlite3 data/govscan.db "UPDATE repos SET readme_text = NULL;"
          git pull --rebase --autostash origin main
          git add -f data/govscan.db
          git diff --staged --quiet && echo "No DB changes" || (
            git commit -m "chore: nightly db update [skip ci]" && git push
          )
