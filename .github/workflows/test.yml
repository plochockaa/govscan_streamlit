name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8

      - name: Install dependencies
        run: uv sync --frozen --extra pipeline

      - name: Run tests
        run: uv run pytest tests/ -v
